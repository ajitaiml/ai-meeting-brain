# docker-compose.yml

services:

  # --------------------------------------------------
  # 1. PostgreSQL with pgvector
  # --------------------------------------------------
  postgres:
    image: ankane/pgvector
    container_name: meeting_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meeting_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --------------------------------------------------
  # 2. FastAPI service
  #    depends_on postgres = waits for DB to start
  #    env_file loads your .env into the container
  # --------------------------------------------------
  api:
    build: .
    container_name: meeting_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      # mounts local code into container
      # so code changes reflect without rebuilding
      - .:/app

volumes:
  postgres_data: