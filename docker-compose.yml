# docker-compose.yml

services:

  # --------------------------------------------------
  # 1. PostgreSQL with pgvector
  # --------------------------------------------------
  postgres:
    image: ankane/pgvector
    container_name: meeting_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meeting_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --------------------------------------------------
  # 2. FastAPI service
  #    env_file loads .env variables into container
  #    environment adds PYTHONPATH for module imports
  #    depends_on ensures postgres starts first
  # --------------------------------------------------
  api:
    build: .
    container_name: meeting_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      - postgres

volumes:
  postgres_data: